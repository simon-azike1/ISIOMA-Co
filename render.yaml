services:
  - type: web
    name: isioma-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        value: your_mongodb_uri_here
      - key: JWT_SECRET
        value: your_secure_jwt_secret_here
      - key: CLIENT_URL
        value: https://your-frontend.onrender.com
